<!DOCTYPE html>
<html>
<head>
    <title>Fábrica</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            background: #F5F5F5;
            font-family: Arial;
            padding: 20px;
        }

        h2 {
            margin-bottom: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 30px 10px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            font-size: 18px;
            text-decoration: none;
            color: black;
            font-weight: bold;
        }

        .logout {
            margin-top: 30px;
            display: block;
            text-align: center;
        }
    </style>
</head>

<body>

<h2>Hola, {{ request.user.username }}</h2>
<p>{{ now|date:"d/m/Y" }}</p>

<div class="grid">

    <a href="{% url 'produccion' %}" class="card">
        📦 Producción
    </a>

    <a href="{% url 'envasado' %}" class="card">
        🏭 Envasado
    </a>

    <a href="{% url 'stock' %}" class="card">
        📊 Stock
    </a>

    <a href="{% url 'palets' %}" class="card">
        📦 Palets
    </a>

    <a href="{% url 'despacho' %}" class="card">
        🚚 Despacho
    </a>

</div>

<a href="{% url 'logout' %}" class="logout">
    🔒 Cerrar sesión
</a>

</body>
</html>
